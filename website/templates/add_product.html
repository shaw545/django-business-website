{% extends 'base.html' %}

{% block title %}Add Product - Yusuf Business Solutions{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-soft">
                <div class="card-body p-5">
                    <h2 class="section-title">Add Product</h2>
                    <p class="muted-text">Upload a product to your seller dashboard.</p>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Save Product</button>
                        <a href="{% url 'seller_dashboard' %}" class="btn btn-outline-secondary ms-2">Back</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
