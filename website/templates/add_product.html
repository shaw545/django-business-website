{% extends 'base.html' %}

{% block title %}Add Product{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body p-4">

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <h2 class="mb-4">Add Product</h2>

    <label>Product Name</label>
    <input type="text" name="name" required>

    <div style="margin-bottom:15px;">
    <label><strong>Product Image 1</strong></label><br>
    <input type="file" name="image">
</div>

<div style="margin-bottom:15px;">
    <label><strong>Product Image 2</strong></label><br>
    <input type="file" name="image_2">
</div>

<div style="margin-bottom:15px;">
    <label><strong>Product Image 3</strong></label><br>
    <input type="file" name="image_3">
</div>

<div style="margin-bottom:15px;">
    <label><strong>Product Image 4</strong></label><br>
    <input type="file" name="image_4">
</div>

<div style="margin-bottom:15px;">
    <label><strong>Product Image 5</strong></label><br>
    <input type="file" name="image_5">
</div>
    <label>Description</label>
    <textarea name="description" required></textarea>

    <label>Amount / Price</label>
    <input type="number" name="amount" step="0.01" required>

    <label>Category</label>
    <select name="category" required>
        <option value="">Select Category</option>
        <option value="Electronics">Electronics</option>
        <option value="Fashion">Fashion</option>
        <option value="Home & Living">Home & Living</option>
        <option value+" Sport">Sport</option>
    </select>
    <label>Size</label>
    <select name="size">
       <input type="text" name="size"
       placeholder="Example: S, M, L, XL">
       <option value="XS">XS</option>
       <option value="S">S</option>
       <option value="M">M</option>
       <option value="L">L</option>
       <option value="XL">XL</option>
       <option value="XXL">XXL</option>
     </select>
    <label>Condition</label>
    <select name="condition">
        <option value="Excellent">Excellent</option>
        <option value="Good">Good</option>
        <option value="Fair">Fair</option>
    </select>
    <label>Available Colors</label>
    <input type="text"
           name="colors"
           placeholder="Example: Black, White, Blue">

    <label>Extra Product Images</label>
    <input type="file" name="extra_images" multiple accept="image/*">
    <p>You can upload up to 5 extra images.</p>

    <button type="submit">Add Product</button>

</form>
 <a href="{% url 'seller_dashboard' %}" class="btn btn-outline-secondary ms-2">
                            Back to Dashboard
                        </a>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
