{% extends 'base.html' %}

{% block title %}Add Product{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h2 class="mb-4">Add Product</h2>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Extra Product Images
                            </label>
                            <input type="file"
                                   name="extra_images"
                                   class="form-control"
                                   accept="image/*"
                                   multiple>

                            <small class="text-muted">
                                Upload front, back, side, and close-up images.
                            </small>
                        </div>
<label>Available Colors</label>
<input 
    type="text" 
    name="colors" 
    placeholder="Example: Black, Silver, Blue, Red"
    class="form-control"
>

<label>Upload More Product Images / Different Angles</label>
<input 
    type="file" 
    name="gallery_images" 
    multiple
    class="form-control"
>
<small>You can upload front, back, side, and close-up images.</small>

                        <button type="submit" class="btn btn-main">
                            Save Product
                        </button>

                        <a href="{% url 'seller_dashboard' %}" class="btn btn-outline-secondary ms-2">
                            Back to Dashboard
                        </a>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
