{% extends 'base.html' %}

{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="mb-4 text-danger">Delete Product</h2>

                    <p>Are you sure you want to delete this product?</p>

                    <div class="mb-3">
                        <strong>{{ product.name }}</strong>
                    </div>

                    {% if product.image %}
                    <div class="mb-3">
                        <img src="{{ product.image.url }}" alt="{{ product.name }}" style="max-width: 220px; border-radius: 10px;">
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'seller_dashboard' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
