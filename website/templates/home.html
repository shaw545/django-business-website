{% load static %}

{% block content %}
<div style="padding: 40px; background:#f5f7fa;">

    <h2 style="margin-bottom: 30px;">Featured Products</h2>

    <div class="product-grid">

        {% for product in products %}
        <div class="product-card">

            <!-- IMAGE -->
            <div class="image-box">
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}">
                {% else %}
                    <p>No image</p>
                {% endif %}
            </div>

            <!-- DETAILS -->
            <div class="info">
                <h3>{{ product.name }}</h3>
                <p class="category">{{ product.category }}</p>

                <!-- ✅ FIXED PRICE -->
                <h2 class="price">SLE {{ product.amount }}</h2>

                <a href="{% url 'product_detail' product.id %}" class="btn-view">
                    View Product
                </a>
            </div>

        </div>
        {% endfor %}

    </div>
</div>
{% endblock %}
