{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="hero">
    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT TEXT -->
            <div class="col-md-6 text-start">
                <h1 class="fw-bold">Shop Smart. Live Better.</h1>
                <p>Discover quality products and trusted services in one place.</p>

                <a href="/products/" class="btn btn-main me-2">Shop Now</a>
                <a href="/register/" class="btn btn-light-custom">Become a Seller</a>
            </div>

            <!-- RIGHT IMAGE -->
            <div class="col-md-6 text-center">
                <img src="{% static 'Images/hero.jpg' %}" class="img-fluid" style="max-height: 420px;" alt="Marketplace Hero">            </div>

        </div>
    </div>
</div>

{% endblock %}
