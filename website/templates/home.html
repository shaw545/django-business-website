{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.product-card {
    background: white;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.product-card img {
    width: 100%;
    height: 170px;
    object-fit: cover;
    border-radius: 8px;
}

.product-name {
    font-size: 14px;
    font-weight: bold;
    margin-top: 6px;
}

.product-category {
    font-size: 12px;
    color: gray;
}

.product-price {
    font-size: 13px;
    font-weight: bold;
    margin-top: 4px;
}

.btn-small {
    display: block;
    width: 100%;
    margin-top: 6px;
    padding: 6px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
}

.view-btn {
    background: orange;
    color: black;
}

.cart-btn {
    background: white;
    border: 1px solid blue;
    color: blue;
}
</style>

<div class="container">

<h2>Featured Products</h2>

<div class="product-grid">

{% for product in products %}
<div class="product-card">

    {% if product.image %}
        <img src="{{ product.image.url }}">
    {% endif %}

    <div class="product-name">{{ product.name }}</div>

    <div class="product-category">{{ product.category.name }}</div>

    <div class="product-price">SLE {{ product.price_sle }}</div>

    <a href="{% url 'product_detail' product.id %}" class="btn-small view-btn">
        View Product
    </a>

    <!-- ✅ LIVE ADD TO CART -->
    <form method="POST" action="{% url 'add_to_cart' product.id %}" class="ajax-add-cart-form">
        {% csrf_token %}
        <button type="submit" class="btn-small cart-btn">
            Add to Cart
        </button>
    </form>

</div>
{% endfor %}

</div>

</div>

{% endblock %}
