{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Luma</title>

    <style>
.product-card {
    position: relative;
}

.discount-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    color: white;
    padding: 4px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    z-index: 5;
}
.old-price{
    text-decoration: line-through;
    color: gray;
    font-size: 13px;
}

.new-price{
    color: red;
    font-weight: bold;
    font-size: 18px;
}


/* ROLLING PROMOTION BANNER */
.promo-banner {
    width: 100%;
    overflow: hidden;
    background: #ff6600;
    color: white;
    padding: 10px 0;
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
}

{% if product.name == "Iphone 17 Pro" %}
    <div class="discount-badge">20% OFF</div>

    <p>
        <span class="old-price">
            SLE 30,000
        </span>

        <br>

        <span class="new-price">
            SLE {{ product.amount }}
        </span>
    </p>

{% else %}

    <p>SLE {{ product.amount }}</p>

{% endif %}

.promo-track {
    display: inline-block;
    padding-left: 100%;
    animation: scrollPromo 22s linear infinite;
}

@keyframes scrollPromo {
    0% {
        transform: translateX(0);
    }

    100% {
        transform: translateX(-100%);
    }
}


        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        /* NAVBAR */

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
            background:#6fb6dc;
            flex-wrap:wrap;
        }

        .logo{
            font-size:26px;
            font-weight:bold;
            color:black;
        }

        .search-box{
            display:flex;
            gap:10px;
        }

        .search-box input{
            padding:10px;
            width:300px;
            border-radius:8px;
            border:none;
        }

        .search-box button{
            padding:10px 15px;
            background:orange;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .nav-links{
            display:flex;
            align-items:center;
            gap:15px;
        }

  .nav-links a{
      text-decoration:none;
      color:black;
      font-weight:bold;
      font-size:8px;

<!-- ROLLING PROMOTION BANNER -->
<div class="promo-banner">
    <div class="promo-track">
        🔥 20% OFF Electronics &nbsp;&nbsp; • &nbsp;&nbsp;
        🚚 Free Delivery in Selected Areas &nbsp;&nbsp; • &nbsp;&nbsp;
        🛒 Buy More, Save More &nbsp;&nbsp; • &nbsp;&nbsp;
        💥 Weekend Mega Deals &nbsp;&nbsp; • &nbsp;&nbsp;
        🎉 New Seller Discounts Available &nbsp;&nbsp; • &nbsp;&nbsp;
        📱 Hot Phone Deals Today
    </div>
</div>
}
  .dashboard-btn{
       background:orange;
       padding:4px 8px;
       border-radius:6px;
      font-size:8px;
}
        /* FILTER */

        .filter-section{
            padding:20px;
            display:flex;
            gap:10px;
        }

        .filter-section select{
            padding:10px;
            border-radius:8px;
            width:250px;
        }

        .filter-section button{
            padding:10px 20px;
            border:none;
            background:orange;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
        }

        /* PRODUCTS */

        .container{
            padding:20px;
        }

        .section-title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .product-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
            gap:20px;
        }

        .product-card{
            background:white;
            border-radius:10px;
            padding:8px;
            box-shadow:0 2px 8px rgba(0,0,0,0.08);
            transition:transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* SHAKING / HOVER EFFECT */

        .product-card:hover{
            transform:translateY(-10px) scale(1.03) rotate(1deg);
            box-shadow:0 15px 30px rgba(0,0,0,0.2);
        }

        .product-card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:8px;
        }

        .product-card h3{
            font-size:18px;
            margin-top:10px;
            margin-bottom:5px;
        }

        .product-card p{
            margin:5px 0;
        }

        .view-btn{
            display:block;
            text-align:center;
            background:orange;
            color:black;
            padding:8px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
            margin-top:10px;
        }

        /* MOBILE */

        @media (max-width:768px){

            .navbar{
                flex-direction:column;
                align-items:stretch;
                gap:10px;
                padding:15px;
            }

            .logo{
                text-align:center;
            }

            .search-box{
                width:100%;
            }

            .search-box input{
                width:100%;
            }

            .nav-links{
                justify-content:center;
                flex-wrap:wrap;
            }

            .filter-section{
                flex-direction:column;
            }

            .filter-section select{
                width:100%;
            }
        }

    </style>
</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            Online Luma
        </div>

        <form method="GET" action="" class="search-box">
            <input type="text" name="q" placeholder="Search products...">
            <button type="submit">Search</button>
        </form>

        <div class="nav-links">
    <a href="/">Home</a>

    <a href="{% url 'products' %}">Products</a>

    <a href="{% url 'cart' %}">Cart</a>

    <a href="{% url 'register' %}"
   style="
   background:white;
   padding:4px 8px;
   border-radius:6px;
   border:2px solid black;
   font-size:11px;
   font-weight:bold;
   ">
   Become a Seller
</a>
    <a href="{% url 'seller_dashboard' %}"
       class="dashboard-btn">
       Dashboard
    </a>
</div>
    </div>

    <!-- FILTER -->

    <form method="GET" class="filter-section">

        <select name="category">
            <option value="">All Categories</option>

            {% for category in categories %}
                <option value="{{ category.id }}">
                    {{ category.name }}
                </option>
            {% endfor %}

        </select>

        <button type="submit">Filter</button>

    </form>

    <!-- PRODUCTS -->

    <div class="container">

        <div class="section-title">
            Featured Products
        </div>

        <div class="product-grid">

            {% for product in products %}

<div class="product-card">

    <div class="discount-badge">DEAL</div>

    {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
    {% endif %}

    <h3>{{ product.name }}</h3>

    <p>
    <span class="old-price">
        SLE {{ product.amount }}
    </span>

    <br>

    <span class="new-price">
        SLE {{ product.amount }}
    </span>
</p>
    <a href="{% url 'product_detail' product.id %}" class="view-btn">
        View
    </a>

</div>

{% empty %}

<p>No products found.</p>

{% endfor %}        </div>

    </div>

</body>
</html>
