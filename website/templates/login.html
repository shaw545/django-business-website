{% extends 'base.html' %}

{% block title %}Seller Sign In - MarketHub{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card shadow-soft">
                <div class="card-body p-5">

                    <h2 class="section-title">Seller Sign In</h2>

                    <p class="muted-text">
                        Login to manage your products and dashboard.
                    </p>

                    <form method="POST">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit" class="btn btn-primary">
                            Sign In
                        </button>

                        <br><br>

                        <a href="{% url 'password_reset' %}">
                            Forgot Password?
                        </a>
                    </form>

                    <p class="mt-3">
                        Don’t have an account?
                        <a href="{% url 'register' %}">
                            Register
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
