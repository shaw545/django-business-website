{% extends "base.html" %}

{% block content %}
<div style="max-width:500px; margin:60px auto; background:white; padding:30px; border-radius:12px; text-align:center;">
    <h2>Password Reset Email Sent</h2>

    <p>
        If the email address exists in our system, a password reset link has been sent.
    </p>

    <p>
        Please check your inbox or spam folder.
    </p>

    <a href="{% url 'login' %}" style="display:inline-block; margin-top:15px; background:orange; padding:12px 20px; border-radius:8px; text-decoration:none; color:black; font-weight:bold;">
        Back to Sign In
    </a>
</div>
{% endblock %}
