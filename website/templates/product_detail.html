{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 90%;
            margin: auto;
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }

        /* LEFT SIDE - IMAGE SLIDER */
        .image-section {
            width: 50%;
        }

        .main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
        }

        .thumbs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .thumbs img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .thumbs img:hover {
            border: 2px solid orange;
        }

        /* RIGHT SIDE */
        .details {
            width: 50%;
        }

        h1 {
            font-size: 28px;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0;
        }

        .desc {
            margin: 10px 0;
            color: #555;
        }

        /* ✅ SMALL BUTTONS */
        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            font-size: 14px;   /* 👈 smaller */
            border-radius: 25px;
            border: none;
            cursor: pointer;
        }

        .buy {
            background: #2563eb;
            color: white;
        }

        .cart {
            background: white;
            color: #2563eb;
            border: 2px solid #2563eb;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- LEFT: IMAGE SLIDER -->
    <div class="image-section">

        <!-- MAIN IMAGE -->
        <img id="mainImage" src="{{ product.image.url }}" class="main-image">

        <!-- THUMBNAILS -->
        <div class="thumbs">
            {% for img in product.images.all %}
                <img src="{{ img.image.url }}" onclick="changeImage(this)">
            {% endfor %}
        </div>

    </div>

    <!-- RIGHT: DETAILS -->
    <div class="details">

        <h1>{{ product.name }}</h1>

        <p>{{ product.category.name }}</p>

        <div class="price">
            SLE {{ product.price_sle }}
        </div>

        <div class="desc">
            {{ product.description }}
        </div>

        <!-- ✅ SMALL BUTTONS -->
        <button class="btn buy">Buy It Now</button>
        <button class="btn cart">Add to Cart</button>

    </div>

</div>

<!-- SCRIPT FOR IMAGE SLIDE -->
<script>
function changeImage(element) {
    document.getElementById("mainImage").src = element.src;
}
</script>

</body>
</html>
