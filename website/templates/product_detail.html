{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            width: 90%;
            margin: auto;
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }

        /* IMAGE SECTION */
        .image-section {
            width: 50%;
        }

        .main-image {
            width: 100%;
            height: 420px;
            object-fit: cover;
            border-radius: 10px;
        }

        .thumbs {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .thumbs img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 6px;
            border: 2px solid transparent;
        }

        .thumbs img:hover {
            border: 2px solid orange;
        }

        /* DETAILS SECTION */
        .details {
            width: 50%;
        }

        .details h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .category {
            color: gray;
            margin-bottom: 10px;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            color: black;
            margin-bottom: 15px;
        }

        .description {
            margin-bottom: 20px;
            color: #555;
        }

        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 10px;
            font-size: 14px;  /* smaller */
            border-radius: 25px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .buy-btn {
            background: #2563eb;
            color: white;
        }

        .cart-btn {
            background: white;
            color: #2563eb;
            border: 2px solid #2563eb;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- LEFT: IMAGE SLIDER -->
    <div class="image-section">

        <!-- MAIN IMAGE -->
        <img id="mainImage" src="{{ product.image.url }}" class="main-image">

        <!-- THUMBNAILS -->
        <div class="thumbs">
            {% for img in product.images.all %}
                <img src="{{ img.image.url }}" onclick="changeImage(this)">
            {% endfor %}
        </div>

    </div>

    <!-- RIGHT: PRODUCT DETAILS -->
    <div class="details">

        <h1>{{ product.name }}</h1>

        <div class="category">
            {{ product.category.name }}
        </div>

        <div class="price">
            SLE {{ product.price_sle }}
        </div>

        <div class="description">
            {{ product.description }}
        </div>

        <!-- BUTTONS -->
        <button class="btn buy-btn">Buy It Now</button>
        <button class="btn cart-btn">Add to Cart</button>

    </div>

</div>

<!-- SCRIPT FOR IMAGE SWITCH -->
<script>
function changeImage(element) {
    document.getElementById("mainImage").src = element.src;
}
</script>

</body>
</html>
