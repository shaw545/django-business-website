{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
.container {
    width: 90%;
    margin: auto;
    display: flex;
    gap: 40px;
    margin-top: 30px;
}

.image-section {
    width: 50%;
}

.main-image {
    width: 100%;
    height: 450px;
    object-fit: contain;
    background: #f2f2f2;
    border-radius: 10px;
}

.gallery {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.gallery img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
}

.details {
    width: 50%;
}

.price {
    font-size: 22px;
    font-weight: bold;
    margin: 10px 0;
}

.btn {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 30px;
    font-size: 14px;
    cursor: pointer;
}

.buy {
    background: blue;
    color: white;
    border: none;
}

.cart {
    background: white;
    border: 2px solid blue;
    color: blue;
}
</style>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="image-section">

        <!-- MAIN IMAGE -->
        {% if product.image %}
            <img src="{{ product.image.url }}" class="main-image">
        {% endif %}

        <!-- EXTRA IMAGES -->
        <div class="gallery">
            {% for img in gallery_images %}
                {% if img.image %}
                    <img src="{{ img.image.url }}">
                {% endif %}
            {% endfor %}
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="details">

        <h2>{{ product.name }}</h2>

        <p>{{ product.category.name }}</p>

        <div class="price">
            SLE {{ product.price_sle }}
        </div>

        <p>{{ product.description }}</p>

        <!-- BUTTONS -->
        <button class="btn buy">Buy It Now</button>
        <button class="btn cart">Add to Cart</button>

    </div>

</div>

{% endblock %}
