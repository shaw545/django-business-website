{% extends "base.html" %}

{% block content %}
<div style="max-width:700px; margin:40px auto; background:white; padding:30px; border-radius:14px;">
    <h2>{% if product %}Edit Product{% else %}Add Product{% endif %}</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Product Name</label>
        <input type="text" name="name" value="{{ product.name|default:'' }}" required>

        <label>Category</label>
        <select name="category" required>
            <option value="">Select Category</option>
            <option value="Electronics" {% if product.category == "Electronics" %}selected{% endif %}>Electronics</option>
            <option value="Fashion & Clothing" {% if product.category == "Fashion & Clothing" %}selected{% endif %}>Fashion & Clothing</option>
            <option value="Home & Living" {% if product.category == "Home & Living" %}selected{% endif %}>Home & Living</option>
            <option value="Beauty & Personal Care" {% if product.category == "Beauty & Personal Care" %}selected{% endif %}>Beauty & Personal Care</option>
            <option value="Sports" {% if product.category == "Sports" %}selected{% endif %}>Sports</option>
            <option value="Other" {% if product.category == "Other" %}selected{% endif %}>Other</option>
        </select>

        <label>Price / Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ product.amount|default:'' }}" required>

        <label>Condition</label>
        <select name="condition" required>
            <option value="Excellent" {% if product.condition == "Excellent" %}selected{% endif %}>Excellent</option>
            <option value="Good" {% if product.condition == "Good" %}selected{% endif %}>Good</option>
            <option value="Fair/Damaged" {% if product.condition == "Fair/Damaged" %}selected{% endif %}>Fair/Damaged</option>
        </select>

        <label>Description</label>
        <textarea name="description" rows="5">{{ product.description|default:'' }}</textarea>

        <label>Upload Product Image</label>
        <input type="file" name="image" accept="image/*">

        {% if product.image %}
            <p>Current Image:</p>
            <img src="{{ product.image.url }}" width="120">
        {% endif %}

        <button type="submit">
            {% if product %}Update Product{% else %}Add Product{% endif %}
        </button>
    </form>
</div>

<style>
input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0 18px;
    border: 1px solid #ccc;
    border-radius: 8px;
}
button {
    width: 100%;
    padding: 14px;
    background: orange;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}
</style>
{% endblock %}
