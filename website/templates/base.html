<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Yusuf Business Solutions{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f3f3f3;
        }

        .navbar {
            background-color: #131921;
        }

        .navbar a {
            color: white !important;
        }

        .hero {
            background: linear-gradient(to right, #232f3e, #37475a);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .card {
            border-radius: 10px;
        }

        .product-card img {
            height: 200px;
            object-fit: cover;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Yusuf</a>

        <form class="d-flex w-50" action="/products/">
            <input class="form-control me-2" type="search" name="q" placeholder="Search products...">
            <button class="btn btn-warning">Search</button>
        </form>

        <div>
            <a href="/cart/" class="me-3">Cart</a>
            <a href="/seller/dashboard/">Dashboard</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
