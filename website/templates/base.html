<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Yusuf Business Solutions{% endblock %}</title>
    <style>
        body { margin:0; font-family: Arial; background:#f5f5f5; }
        .header { background:#1e73e8; color:white; padding:20px 40px; display:flex; justify-content:space-between; }
        .header h1 { margin:0; font-size:22px; }
        .nav a { color:white; text-decoration:none; margin-left:20px; }
        .container { max-width:1100px; margin:60px auto; background:white; padding:40px; border-radius:8px; }
        .footer { background:#222; color:white; text-align:center; padding:20px; margin-top:40px; }
        .btn { background:#1e73e8; color:white; padding:12px 24px; border:none; border-radius:4px; cursor:pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Yusuf Business Solutions</h1>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/services/">Services</a>
        <a href="/contact/">Contact</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    © 2026 Yusuf Business Solutions
</div>

</body>
</html>
