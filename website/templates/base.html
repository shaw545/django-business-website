{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Yusuf Business Solutions{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        /* NAVBAR */
        .navbar {
            background-color: #87cefa;
            padding: 14px 0;
        }

        .navbar-brand {
            color: #0f172a !important;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .navbar a {
            color: #0f172a !important;
            text-decoration: none;
            margin-right: 15px;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #ff9900 !important;
        }

        /* ORANGE BUTTONS */
        .search-btn {
            background-color: #ff9900;
            border: none;
            color: black;
            font-weight: 600;
        }

        .search-btn:hover {
            background-color: #e68a00;
            color: black;
        }

        .btn-main {
            background-color: #ff9900;
            color: black;
            border: none;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 8px;
        }

        .btn-main:hover {
            background-color: #e68a00;
            color: black;
        }

        /* HERO */
        .hero {
    background-color: #87cefa;
    padding: 80px 20px;
}        }

        .hero h1 {
            font-weight: 700;
            font-size: 3.2rem;
            margin-bottom: 12px;
        }

        .hero p {
            font-size: 1.1rem;
            margin-bottom: 24px;
        }

        .btn-light-custom {
            background-color: #ffffff;
            color: #0f172a;
            border: 1px solid #d1d5db;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 8px;
        }

        .btn-light-custom:hover {
            background-color: #f3f4f6;
        }

        /* CARDS */
        .card {
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background-color: white;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
        }

        .product-card img {
            height: 200px;
            object-fit: cover;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .section-padding {
            padding: 60px 0;
        }

        .footer {
            background-color: #87cefa;
            color: #0f172a;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        .category-card {
            padding: 30px 20px;
            text-align: center;
            transition: 0.3s ease;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 153, 0, 0.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">

        <a class="navbar-brand" href="/">Yusuf</a>

        <form class="d-flex w-50" action="/products/">
            <input class="form-control me-2" type="search" name="q" placeholder="Search products...">
            <button class="btn search-btn" type="submit">Search</button>
        </form>

        <div class="d-flex align-items-center">
            <a href="/">Home</a>
            <a href="/products/">Products</a>
            <a href="/cart/">Cart</a>

            {% if user.is_authenticated %}
                <a href="/seller/dashboard/" class="btn btn-main btn-sm">Dashboard</a>
            {% else %}
                <a href="/register/" class="btn btn-main btn-sm">Seller Register</a>
            {% endif %}
        </div>

    </div>
</nav>

{% block content %}{% endblock %}

<div class="footer">
    <p class="mb-0">© 2026 Yusuf Business Solutions</p>
</div>

</body>
</html>
