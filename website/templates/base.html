{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Yusuf Business Solutions{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f3f3f3;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #131921;
            padding: 14px 0;
        }

        .navbar-brand {
            color: white !important;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .navbar a {
            color: white !important;
            text-decoration: none;
            margin-right: 15px;
        }

        .navbar a:hover {
            color: #ff9900 !important;
        }

        .search-btn {
            background-color: #ff9900;
            border: none;
            color: black;
            font-weight: 600;
        }

        .search-btn:hover {
            background-color: #e68a00;
        }

        .hero {
            background: linear-gradient(to right, #232f3e, #37475a);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-weight: bold;
        }

        .btn-amazon {
            background-color: #ff9900;
            color: black;
            border: none;
            font-weight: 600;
        }

        .btn-amazon:hover {
            background-color: #e68a00;
        }

        .card {
            border-radius: 10px;
            border: none;
        }

        .product-card img {
            height: 200px;
            object-fit: cover;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .section-padding {
            padding: 60px 0;
        }

        .footer {
            background-color: #131921;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">

        <a class="navbar-brand" href="/">Yusuf</a>

        <form class="d-flex w-50" action="/products/">
            <input class="form-control me-2" type="search" name="q" placeholder="Search products...">
            <button class="btn search-btn">Search</button>
        </form>

        <div class="d-flex align-items-center">
            <a href="/">Home</a>
            <a href="/products/">Products</a>
            <a href="/cart/">Cart</a>

            {% if user.is_authenticated %}
                <a href="/seller/dashboard/" class="btn btn-amazon btn-sm">Dashboard</a>
            {% else %}
                <a href="/register/" class="btn btn-amazon btn-sm">Seller Register</a>
            {% endif %}
        </div>

    </div>
</nav>

{% block content %}{% endblock %}

<div class="footer">
    <p>© 2026 Yusuf Business Solutions</p>
</div>

</body>
</html>
