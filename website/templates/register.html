{% extends 'base.html' %}

{% block title %}Seller Registration - Yusuf Business Solutions{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-soft">
                <div class="card-body p-5">
                    <h2 class="section-title">Seller Registration</h2>
                    <p class="muted-text">Create your seller account to manage products on the marketplace.</p>

                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>

                    <p class="mt-3">
                        Already have an account?
                        <a href="{% url 'login' %}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
