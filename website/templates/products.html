{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yusuf Marketplace</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        h2 {
            margin: 20px 0;
        }

        /* PRODUCT GRID */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* PRODUCT CARD */
        .product-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* IMAGE */
        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* NAME */
        .product-name {
            font-size: 15px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* CATEGORY */
        .product-category {
            font-size: 12px;
            color: gray;
        }

        /* ✅ SMALL PRICE */
        .product-price {
            font-size: 13px;
            color: black;
            font-weight: bold;
            margin-top: 5px;
        }

        /* ✅ SMALL BUTTON */
        .view-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 10px;
            font-size: 12px;
            background: orange;
            color: black;
            border-radius: 6px;
            text-decoration: none;
        }

        .view-btn:hover {
            background: #e68a00;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Featured Products</h2>

    <div class="product-grid">

        {% for product in products %}
        <div class="product-card">

            <img src="{{ product.image.url }}" alt="{{ product.name }}">

            <div class="product-name">
                {{ product.name }}
            </div>

            <div class="product-category">
                {{ product.category.name }}
            </div>

            <div class="product-price">
                SLE {{ product.price_sle }}
            </div>

            <a href="{% url 'product_detail' product.id %}" class="view-btn">
                View Product
            </a>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
