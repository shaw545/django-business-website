{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="products-page">
    <h1 class="page-title">All Products</h1>

    <div class="product-grid">
        <div style="
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:18px;
">

{% for product in products %}

<div style="
    background:white;
    border-radius:14px;
    padding:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
">

    <!-- PRODUCT IMAGE -->
    {% if product.image %}
        <img src="{{ product.image.url }}"
             style="
                width:100%;
                height:160px;
                object-fit:cover;
                border-radius:10px;
             ">
    {% else %}
        <div style="
            width:100%;
            height:160px;
            background:#eee;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#777;
            font-size:16px;
        ">
            No image
        </div>
    {% endif %}

    <!-- PRODUCT NAME -->
    <h3 style="
        font-size:22px;
        margin-top:12px;
        margin-bottom:8px;
        color:#0a1f44;
    ">
        {{ product.name }}
    </h3>

    <!-- CATEGORY -->
    <p style="
        color:#777;
        font-size:14px;
        margin-bottom:8px;
    ">
        {{ product.category }}
    </p>

    <!-- PRICE -->
    <p style="
        font-size:16px;
        font-weight:bold;
        margin-bottom:14px;
        color:#000;
    ">
        SLE {{ product.amount }}
    </p>

    <!-- VIEW BUTTON -->
    <a href="{% url 'product_detail' product.id %}"
       style="
        display:block;
        text-align:center;
        background:orange;
        color:black;
        padding:10px;
        border-radius:10px;
        text-decoration:none;
        font-weight:bold;
        font-size:15px;
       ">
        View
    </a>

</div>

{% endfor %}

</div>    </div>
</div>

<style>
.products-page {
    padding: 18px 40px;
    background: #f5f7fa;
}

.page-title {
    font-size: 22px;
    margin-bottom: 25px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
}

.product-card {
    background: white;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

.product-image img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    border-radius: 10px;
    background: #f1f1f1;
}

.no-image {
    width: 100%;
    height: 180px;
    background: #f1f1f1;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #777;
}

.product-card h3 {
    font-size: 18px;
    margin: 10px 0 4px;
}

.category {
    color: #777;
    font-size: 13px;
    margin: 0;
}

.amount {
    font-size: 12px;
    font-weight: bold;
    margin: 8px 0;
}

.view-btn,
.add-btn {
    display: block;
    text-align: center;
    padding: 10px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 8px;
}

.view-btn {
    background: orange;
    color: black;
}

.add-btn {
    border: 1px solid blue;
    color: blue;
    background: white;
}

@media (max-width: 900px) {
    .product-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .product-grid {
        grid-template-columns: 1fr;
    }
}
</style>

{% endblock %}
